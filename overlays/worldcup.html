<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 TV Scoreboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800;900&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/overlays/worldcup.css">
</head>
<body>
    <div class="scoreboard-wrapper">
        <!-- Main Scoreboard TV Bar -->
        <div id="tv-scoreboard" class="tv-scoreboard-bar">
            <!-- Left Logo Icon Block -->
            <div class="fwc-logo-box">
                <img id="fwc-logo-img" src="https://static.wikia.nocookie.net/logopedia/images/4/44/FWC26_CanMexUSA_hz.png/revision/latest/scale-to-width-down/1000?cb=20260604001303" alt="FWC 26 Logo">
            </div>

            <!-- Match Score Block -->
            <div class="match-score-area">
                <!-- Team 1 -->
                <div class="team-capsule team-left">
                    <span class="kit-color-bar" id="team1-color-bar" style="background-color: #ff3d00;"></span>
                    <span class="team-code" id="team1-code-display">ESP</span>
                </div>

                <!-- Score digits -->
                <div class="score-number-box" id="team1-score-box">0</div>
                <div class="score-divider">:</div>
                <div class="score-number-box" id="team2-score-box">0</div>

                <!-- Team 2 -->
                <div class="team-capsule team-right">
                    <span class="team-code" id="team2-code-display">USA</span>
                    <span class="kit-color-bar" id="team2-color-bar" style="background-color: #00b0ff;"></span>
                </div>
            </div>

            <!-- Timer Area -->
            <div class="timer-display-box">
                <span id="time-display">00:00</span>
                <span class="timer-dot active" id="timer-dot"></span>
            </div>
        </div>

        <!-- GOAL Celebratory Banner (Hidden by default, slides out/in) -->
        <div id="goal-banner" class="goal-celebration-banner">
            <div class="goal-gradient-overlay"></div>
            <div class="goal-content">
                <span class="goal-text-main">GOAL!</span>
                <span class="goal-team-label" id="goal-team-label">ESP</span>
            </div>
        </div>
    </div>

    <script src="/overlays/worldcup.js"></script>
</body>
</html>
