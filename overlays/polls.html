<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Live Suite - Live Poll Overlay</title>
    <!-- Google Fonts: Outfit para un look premium moderno -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="polls.css">
</head>
<body>
    <div id="poll-container" class="poll-card hidden">
        <!-- Cabecera de la encuesta -->
        <div class="poll-header">
            <div class="poll-badge-container">
                <span class="badge active-badge" id="poll-status">ENCUESTA ACTIVA</span>
                <span class="badge time-badge" id="poll-timer">00:00</span>
            </div>
            <h2 id="poll-title">¿Qué juego deberíamos jugar hoy en directo?</h2>
            <div class="poll-meta">
                <span id="poll-total-votes">0 votos</span>
            </div>
        </div>

        <!-- Barra de progreso de tiempo restante -->
        <div class="timer-progress-bar">
            <div id="timer-fill" class="timer-fill"></div>
        </div>

        <!-- Opciones de la encuesta -->
        <div class="poll-options" id="poll-options-container">
            <!-- Las opciones se generarán dinámicamente -->
        </div>
    </div>

    <!-- Script de lógica de la encuesta -->
    <script src="polls.js"></script>
</body>
</html>
